name: "DocDrift"
description: "Detect documentation drift in pull requests"
author: "DocDrift"
branding:
  icon: "file-text"
  color: "blue"

inputs:
  ollama-api-key:
    description: "Ollama Cloud API key (ollama.com). Required."
    required: false
  github-token:
    description: "GitHub token for reading diffs and posting comments"
    required: false
    default: ${{ github.token }}
  model:
    description: "Ollama model to use. gpt-oss (default) or gpt-oss:120b for higher quality."
    required: false
    default: "gpt-oss:20b"
  confidence-threshold:
    description: "Minimum confidence score (0-1) for a finding to be reported"
    required: false
    default: "0.7"
  scaffold-missing-docs:
    description: "When no doc files exist, generate starter documentation stubs as a PR comment"
    required: false
    default: "true"
  confluence-url:
    description: "Confluence base URL (e.g. https://yourorg.atlassian.net/wiki). When set, DocDrift will search Confluence pages for drift alongside repo docs."
    required: false
  confluence-email:
    description: "Atlassian account email. Required for Atlassian Cloud API token auth. Omit when using a Data Center PAT."
    required: false
  confluence-api-token:
    description: "Atlassian API token (Cloud) or Personal Access Token (Data Center)."
    required: false
  confluence-space-key:
    description: "Confluence space key to scope page search (e.g. TECH). Omit to search all spaces."
    required: false

outputs:
  findings-count:
    description: "Number of drift findings detected"

runs:
  using: "node24"
  main: "dist/bundle.cjs"
