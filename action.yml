name: "DocDrift"
description: "Detect documentation drift in pull requests"
author: "DocDrift"
branding:
  icon: "file-text"
  color: "blue"

inputs:
  huggingface-api-key:
    description: "HuggingFace API token (HF_TOKEN). When set, used as primary LLM. Falls back to Anthropic if anthropic-api-key is also provided."
    required: false
  anthropic-api-key:
    description: "Anthropic API key. Used as primary when huggingface-api-key is not set; used as fallback when both are provided."
    required: false
  github-token:
    description: "GitHub token for reading diffs and posting comments"
    required: false
    default: ${{ github.token }}
  model:
    description: "Anthropic model to use. Defaults to claude-haiku-4-5-20251001 (cheapest/fastest). Use claude-sonnet-4-6 for higher quality."
    required: false
    default: "claude-haiku-4-5-20251001"
  confidence-threshold:
    description: "Minimum confidence score (0-1) for a finding to be reported"
    required: false
    default: "0.7"
  scaffold-missing-docs:
    description: "When no doc files exist, generate starter documentation stubs as a PR comment"
    required: false
    default: "true"
  confluence-url:
    description: "Confluence base URL (e.g. https://yourorg.atlassian.net/wiki). When set, DocDrift will search Confluence pages for drift alongside repo docs."
    required: false
  confluence-email:
    description: "Atlassian account email. Required for Atlassian Cloud API token auth. Omit when using a Data Center PAT."
    required: false
  confluence-api-token:
    description: "Atlassian API token (Cloud) or Personal Access Token (Data Center)."
    required: false
  confluence-space-key:
    description: "Confluence space key to scope page search and auto-create pages (e.g. TECH). Required for Confluence page auto-creation."
    required: false
  confluence-parent-page-id:
    description: "Confluence page ID to nest auto-created pages under. Optional."
    required: false
  confluence-preview:
    description: "When true, post full page content in the PR comment instead of creating Confluence pages (dry-run). Default: false."
    required: false
    default: "false"
  doc-template:
    description: "Which documentation template to use: auto (default), architecture, api-reference, setup-guide, release-notes, migration-guide."
    required: false
    default: "auto"
  release-tag-prefix:
    description: "Tag prefix used to identify release tags when generating release notes on push events. Default: v"
    required: false
    default: "v"

outputs:
  findings-count:
    description: "Number of drift findings detected"

runs:
  using: "node24"
  main: "packages/action/dist/bundle.cjs"
